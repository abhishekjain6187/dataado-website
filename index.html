  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px; right:-120px; width:640px; height:640px; border-radius:50%; background:radial-gradient(circle at 30% 30%, var(--glow-a) 0%, var(--glow-b) 42%, transparent 74%); filter:blur(8px); opacity:var(--glow-op); animation:meshshift 16s ease-in-out infinite;\"><\u002Fdiv>\n      <div style=\"position:relative; z-index:2; display:grid; grid-template-columns:1.05fr .95fr; gap:48px; align-items:center;\">\n        <div>\n          <div style=\"display:inline-flex; align-items:center; gap:8px; background:var(--eyebrow-bg); color:var(--eyebrow-fg); font-weight:600; font-size:13px; letter-spacing:.06em; text-transform:uppercase; padding:7px 14px; border-radius:999px;\">Managed File Transfer · ETL · Workflow<\u002Fdiv>\n          <h1 style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:56px; line-height:1.04; letter-spacing:-.025em; color:var(--ink); margin:22px 0 20px;\">Every file. Every transform.<br>One orchestrated flow.<\u002Fh1>\n          <p style=\"font-size:19px; line-height:1.6; color:var(--muted); margin:0 0 32px; max-width:520px;\">Strata moves files across SFTP, cloud, and on‑prem systems, runs SQL‑based ETL, and orchestrates all of it as reliable, auditable workflows — so the work runs itself, and you can prove it did.<\u002Fp>\n          <div style=\"display:flex; gap:14px; align-items:center;\">\n            <a href=\"mailto:abhishekjain.6187@outlook.com?subject=Enquiry%20for%20Strata\" style=\"background:var(--primary); color:var(--btn-fg); font-weight:600; font-size:16px; padding:15px 28px; border-radius:12px; box-shadow:0 16px 30px -12px var(--glow-b);\">Get in touch →<\u002Fa>\n            <a href=\"#how\" style=\"color:var(--ink); font-weight:600; font-size:16px; padding:15px 20px;\">See how it works<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--panel-bg); backdrop-filter:blur(12px); border:1px solid var(--panel-border); border-radius:20px; padding:26px; box-shadow:0 30px 60px -30px rgba(0,0,0,.45); animation:floaty 7s ease-in-out infinite;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;\">\n            <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; color:var(--ink);\">Nightly reconciliation<\u002Fspan>\n            <span style=\"font-size:12px; font-weight:600; color:var(--running-fg); background:var(--running-bg); padding:4px 10px; border-radius:999px;\">● Running<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"display:flex; align-items:center; gap:12px; background:var(--panel-item-bg); border:1px solid var(--panel-item-border); border-radius:12px; padding:12px 14px;\"><span style=\"width:30px; height:30px; border-radius:8px; background:var(--num-bg); color:var(--num-fg); display:grid; place-items:center; font-weight:700; font-size:13px;\">1<\u002Fspan><span style=\"font-size:14px; color:var(--ink); font-weight:500;\">File arrives on SFTP<\u002Fspan><\u002Fdiv>\n            <div style=\"width:1px; height:12px; background:var(--step-line); margin-left:29px;\"><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px; background:var(--panel-item-bg); border:1px solid var(--panel-item-border); border-radius:12px; padding:12px 14px;\"><span style=\"width:30px; height:30px; border-radius:8px; background:var(--num2-bg); color:var(--num2-fg); display:grid; place-items:center; font-weight:700; font-size:13px;\">2<\u002Fspan><span style=\"font-size:14px; color:var(--ink); font-weight:500;\">Decrypt · run SQL export<\u002Fspan><\u002Fdiv>\n            <div style=\"width:1px; height:12px; background:var(--step-line); margin-left:29px;\"><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:12px; background:var(--panel-item-bg); border:1px solid var(--panel-item-border); border-radius:12px; padding:12px 14px;\"><span style=\"width:30px; height:30px; border-radius:8px; background:var(--num3-bg); color:var(--num3-fg); display:grid; place-items:center; font-weight:700; font-size:13px;\">3<\u002Fspan><span style=\"font-size:14px; color:var(--ink); font-weight:500;\">Upload results · notify Teams<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WHAT STRATA DOES -->\n    <div id=\"platform\" style=\"padding:24px 40px 72px;\">\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:20px;\">\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px;\">\n          <div style=\"width:44px; height:44px; border-radius:11px; background:var(--icon1-grad); display:grid; place-items:center; margin-bottom:18px;\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--icon-fg)\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12h16M14 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; color:var(--ink); margin:0 0 10px;\">Managed File Transfer<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color:var(--muted); margin:0;\">Move files securely between SFTP, Azure Blob, and local systems with checksum verification, retries, and streamed PGP encryption built in.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px;\">\n          <div style=\"width:44px; height:44px; border-radius:11px; background:var(--icon2-grad); display:grid; place-items:center; margin-bottom:18px;\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--icon-fg)\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><ellipse cx=\"12\" cy=\"6\" rx=\"8\" ry=\"3\"><\u002Fellipse><path d=\"M4 6v12c0 >\n        <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:38px; letter-spacing:-.02em; color:var(--ink); margin:10px 0 0;\">Everything the flow needs, in one place<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:18px;\">\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px;\"><h4 style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:var(--ink); margin:0 0 8px;\">Visual workflow designer<\u002Fh4><p style=\"font-size:14px; line-height:1.55; color:var(--muted); margin:0;\">Build top‑to‑bottom flows with per‑activity forms, connection pickers, and a live JSON view.<\u002Fp><\u002Fdiv>\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px;\"><h4 style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:var(--ink); margin:0 0 8px;\">Schedule · file · webhook triggers<\u002Fh4><p style=\"font-size:14px; line-height:1.55; color:var(--muted); margin:0;\">Run on a cron schedule, the moment a file lands, or from an inbound webhook.<\u002Fp><\u002Fdiv>\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px;\"><h4 style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:var(--ink); margin:0 0 8px;\">Streamed PGP encryption<\u002Fh4><p style=\"font-size:14px; line-height:1.55; color:var(--muted); margin:0;\">Encrypt and decrypt multi‑gigabyte files with bounded, predictable memory.<\u002Fp><\u002Fdiv>\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px;\"><h4 style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:var(--ink); margin:0 0 8px;\">Tamper‑evident audit<\u002Fh4><p style=\"font-size:14px; line-height:1.55; color:var(--muted); margin:0;\">Every change is hash‑chained and append‑only — enforced at the database itself.<\u002Fp><\u002Fdiv>\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px;\"><h4 style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:var(--ink); margin:0 0 8px;\">Multi‑tenant by design<\u002Fh4><p style=\"font-size:14px; line-height:1.55; color:var(--muted); margin:0;\">Fail‑closed isolation and five server‑side roles, from read‑only to admin.<\u002Fp><\u002Fdiv>\n        <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px;\"><h4 style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; color:var(--ink); margin:0 0 8px;\">Operational alerting<\u002Fh4><p style=\"font-size:14px; line-height:1.55; color:var(--muted); margin:0;\">Health checks, stuck‑run detection, and failure alerts to email or Teams.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HOW IT WORKS -->\n    <div id=\"how\" style=\"padding:16px 40px 72px;\">\n      <div style=\"background:var(--howto-bg); border:1px solid var(--howto-border); border-radius:22px; padding:52px 48px; color:#fff; position:relative; overflow:hidden;\">\n        <div style=\"position:absolute; bottom:-140px; right:-80px; width:420px; height:420px; border-radius:50%; background:radial-gradient(circle,var(--primary) 0%,transparent 70%); opacity:.32;\"><\u002Fdiv>\n        <div style=\"position:relative; z-index:2;\">\n          <div style=\"font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--howto-eyebrow);\">How it works<\u002Fdiv>\n          <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:34px; letter-spacing:-.02em; margin:10px 0 34px; max-width:560px; color:#F4F7FF;\">A workflow is a directed graph of activities — read left to right.<\u002Fh2>\n          <div style=\"display:flex; align-items:stretch; gap:0; flex-wrap:wrap;\">\n            <div style=\"flex:1; min-width:150px; text-align:center;\"><div style=\"width:56px; height:56px; margin:0 auto 14px; border-radius:14px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); display:grid; place-items:center; font-family:'Space Grotesk',sans-serif; font-weight:700; color:var(--howto-num-fg);\">01<\u002Fdiv><div style=\"font-weight:600; font-size:15px; color:#EDF1FB;\">File arrives<\u002Fdiv><div style=\"font-size:13px; color:var(--howto-sub); margin-top:4px;\">SFTP poll trigger<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center; color:var(--howto-arrow); font-size:22px; padding:0 6px; margin-top:-30px;\">→<\u002Fdiv>\n            <div style=\"flex:1; min-width:150px; text-align:center;\"><div style=\"width:56px; height:56px; margin:0 auto 14px; border-radius:14px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); display:grid; place-items:center; font-family:'Space Grotesk',sans-serif; font-weight:700; color:var(--howto-num-fg);\">02<\u002Fdiv><div style=\"font-weight:600; font-size:15px; color:#EDF1FB;\">Decrypt (PGP)<\u002Fdiv><div style=\"font-size:13px; color:var(--howto-sub); margin-top:4px;\">streamed, verified<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center; color:var(--howto-arrow); font-size:22px; padding:0 6px; margin-top:-30px;\">→<\u002Fdiv>\n            <div style=\"flex:1; min-width:150px; text-align:center;\"><div style=\"width:56px; height:56px; margin:0 auto 14px; border-radius:14px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); display:grid; place-items:center; font-family:'Space Grotesk',sans-serif; font-weight:700; color:var(--howto-num-fg);\">03<\u002Fdiv><div style=\"font-weight:600; font-size:15px; color:#EDF1FB;\">Run SQL · export<\u002Fdiv><div style=\"font-size:13px; color:var(--howto-sub); margin-top:4px;\">SQL Server · Oracle<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center; color:var(--howto-arrow); font-size:22px; padding:0 6px; margin-top:-30px;\">→<\u002Fdiv>\n  sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--check)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:2px; flex-shrink:0;\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px; color:var(--muted); line-height:1.5;\">Secrets in Azure Key Vault — never in configuration or definitions.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px; align-items:flex-start;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--check)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:2px; flex-shrink:0;\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px; color:var(--muted); line-height:1.5;\">TLS required by default · SFTP host‑key pinning on save.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px; align-items:flex-start;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--check)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:2px; flex-shrink:0;\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px; color:var(--muted); line-height:1.5;\">Role‑based access enforced server‑side, plus stuck‑run recovery.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--accent2-fg);\">Connects to<\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:30px; letter-spacing:-.02em; color:var(--ink); margin:10px 0 24px;\">Speaks to the systems you already run<\u002Fh2>\n        <div style=\"display:flex; flex-wrap:wrap; gap:10px;\">\n          <span style=\"background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:11px 16px; font-size:14px; font-weight:600; colo o see Strata move your data?<\u002Fh2>\n        <p style=\"font-size:18px; color:var(--cta-p); margin:0 0 30px; font-weight:500;\">Tell us what you're moving and we'll show you the flow.<\u002Fp>\n        <a href=\"mailto:abhishekjain.6187@outlook.com?subject=Enquiry%20for%20Strata\" style=\"display:inline-block; background:var(--cta-btn-bg); color:var(--cta-btn-fg); font-weight:700; font-size:17px; padding:16px 34px; border-radius:12px; box-shadow:0 20px 40px -16px rgba(0,0,0,.35);\">Contact us →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FOOTER -->\n    <div style=\"padding:32px 40px 48px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;\">\n      <div style=\"display:flex; align-items:center; gap:10px;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2 22 7 12 12 2 7 12 2Z\" fill=\"var(--primary)\"><\u002Fpath><\u002Fsvg><span style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:17px; color:var(--ink);\">Strata<\u002Fspan><\u002Fdiv>\n      <span style=\"font-size:14px; color:var(--faint);\">Managed File Transfer · ETL · Workflow<\u002Fspan>\n      <a href=\"mailto:abhishekjain.6187@outlook.com?subject=Enquiry%20for%20Strata\" style=\"font-size:14px; color:var(--primary); font-weight:600;\">abhishekjain.6187@outlook.com<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { dark: false };\n\n  componentDidMount() {\n    try {\n      const v = localStorage.getItem('strata-theme');\n      if (v === 'dark') this.setState({ dark: true });\n      else if (v === 'light') this.setState({ dark: false });\n      else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) this.setState({ dark: true });\n    } catch (e) {}\n  }\n\n  toggle() {\n    this.setState(s => {\n      const dark = !s.dark;\n      try { localStorage.setItem('strata-theme', dark ? 'dark' : 'light'); } catch (e) {}\n      return { dark };\n    });\n  }\n\n  renderVals() {\n    const light = {\n      '--bg': '#F7F8FC', '--ink': '#1B1F3B', '--muted': '#565B78', '--border': '#E7E8F2',\n      '--surface': '#FFFFFF', '--primary': '#4F46E5',\n      '--mark-2': '#818CF8', '--mark-3': '#22D3EE',\n      '--nav-link': '#4A4F6B', '--nav-cta-bg': '#1B1F3B', '--nav-cta-fg': '#FFFFFF',\n      '--eyebrow-bg': 'rgba(79,70,229,.09)', '--eyebrow-fg': '#4338CA',\n      '--btn-fg': '#FFFFFF',\n      '--glow-a': '#818CF8', '--glow-b': '#4F46E5', '--glow-op': '.40',\n      '--panel-bg': 'rgba(255,255,255,.72)', '--panel-border': '#E7E8F2',\n      '--panel-item-bg': '#FFFFFF', '--panel-item-border': '#EDEEF6',\n      '--running-fg': '#059669', '--running-bg': 'rgba(5,150,105,.12)',\n      '--num-bg': '#EEF0FE', '--num-fg': '#4F46E5',\n      '--num2-bg': '#E8FBFF', '--num2-fg': '#0891B2',\n      '--num3-bg': '#EEF0FE', '--num3-fg': '#4F46E5',\n      '--step-line': '#D6D8E8',\n      '--icon1-grad': 'linear-gradient(135deg,#4F46E5,#6366F1)',\n      '--icon2-grad': 'linear-gradient(135deg,#0891B2,#22D3EE)',\n      '--icon3-grad': 'linear-gradient(135deg,#4338CA,#818CF8)',\n      '--icon-fg': '#FFFFFF',\n      '--howto-bg': 'linear-gradient(160deg,#1B1F3B,#312E81)', '--howto-border': 'transparent',\n      '--howto-eyebrow': '#A5B4FC', '--howto-arrow': '#6366F1', '--howto-num-fg': '#C7D2FE',\n      '--howto-accent-bg': 'rgba(34,211,238,.15)', '--howto-accent-border': 'rgba(34,211,238,.35)', '--howto-accent-fg': '#67E8F9',\n      '--howto-chip-bg': 'rgba(255,255,255,.08)', '--howto-chip-border': 'rgba(255,255,255,.14)', '--howto-chip-fg': '#C7D2FE',\n      '--howto-sub': '#A9B0D6',\n      '--check': '#4F46E5', '--accent2-fg': '#0891B2',\n      '--cta-grad': 'linear-gradient(135deg,#4F46E5,#6366F1 55%,#22D3EE)',\n      '--cta-h': '#FFFFFF', '--cta-p': 'rgba(255,255,255,.9)', '--cta-btn-bg': '#FFFFFF', '--cta-btn-fg': '#4338CA',\n      '--faint': '#8B90A6'\n    };\n    const dark = {\n      '--bg': '#0F1B2D', '--ink': '#EAF0FA', '--muted': '#9FB0C9', '--border': 'rgba(255,255,255,.08)',\n      '--surface': 'rgba(255,255,255,.04)', '--primary': '#38BDF8',\n      '--mark-2': '#A78BFA', '--mark-3': '#5EEAD4',\n      '--nav-link': '#AEBED6', '--nav-cta-bg': '#38BDF8', '--nav-cta-fg': '#0F1B2D',\n      '--eyebrow-bg': 'rgba(56,189,248,.12)', '--eyebrow-fg': '#7DD3FC',\n      '--btn-fg': '#0F1B2D',\n      '--glow-a': '#38BDF8', '--glow-b': '#A78BFA', '--glow-op': '.22',\n      '--panel-bg': 'rgba(255,255,255,.04)', '--panel-border': 'rgba(255,255,255,.10)',\n      '--panel-item-bg': 'rgba(255,255,255,.05)', '--panel-item-border': 'rgba(255,255,255,.08)',\n      '--running-fg': '#5EEAD4', '--running-bg': 'rgba(94,234,212,.12)',\n      '--num-bg': 'rgba(56,189,248,.16)', '--num-fg': '#7DD3FC',\n      '--num2-bg': 'rgba(167,139,250,.18)', '--num2-fg': '#C4B5FD',\n      '--num3-bg': 'rgba(94,234,212,.16)', '--num3-fg': '#5EEAD4',\n      '--step-line': 'rgba(255,255,255,.14)',\n      '--icon1-grad': 'linear-gradient(135deg,#0EA5E9,#38BDF8)',\n      '--icon2-grad': 'linear-gradient(135deg,#8B5CF6,#A78BFA)',\n      '--icon3-grad': 'linear-gradient(135deg,#14B8A6,#5EEAD4)',\n      '--icon-fg': '#0F1B2D',\n      '--howto-bg': 'linear-gradient(160deg,#13233A,#1B2B45)', '--howto-border': 'rgba(255,255,255,.08)',\n      '--howto-eyebrow': '#7DD3FC', '--howto-arrow': '#38BDF8', '--howto-num-fg': '#7DD3FC',\n      '--howto-accent-bg': 'rgba(94,234,212,.14)', '--howto-accent-border': 'rgba(94,234,212,.35)', '--howto-accent-fg': '#5EEAD4',\n      '--howto-chip-bg': 'rgba(255,255,255,.06)', '--howto-chip-border': 'rgba(255,255,255,.14)', '--howto-chip-fg': '#B8C7DE',\n      '--howto-sub': '#8FA1BC',\n      '--check': '#5EEAD4', '--accent2-fg': '#A78BFA',\n      '--cta-grad': 'linear-gradient(135deg,#0EA5E9,#38BDF8 50%,#A78BFA)',\n      '--cta-h': '#0B1424', '--cta-p': 'rgba(15,27,45,.82)', '--cta-btn-bg': '#0F1B2D', '--cta-btn-fg': '#EAF0FA',\n      '--faint': '#7C8DA8'\n    };\n    const isDark = this.state.dark;\n    const t = isDark ? dark : light;\n    const vars = Object.assign({}, t, {\n      background: 'var(--bg)',\n      color: 'var(--ink)',\n      minHeight: '100vh',\n      fontFamily: \"'Instrument Sans',sans-serif\",\n      transition: 'background .35s ease, color .35s ease'\n    });\n    return {\n      vars,\n      isDark,\n      isLight: !isDark,\n      modeLabel: isDark ? 'Light' : 'Dark',\n      toggle: () => this.toggle()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
